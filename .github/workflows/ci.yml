# CI for the gumbox Deno workspace. Jobs mirror the deno.json tasks so the
# pipeline stays correct as the underlying tools change: check (fmt + lint +
# typecheck), test (vitest against real Vite pipelines; browser suites use the
# runner's preinstalled Chrome), and build (dist output).
name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    check:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Set up Deno
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
              with:
                  deno-version: v2.x
                  cache: true

            - name: Install dependencies
              run: deno install --frozen

            - name: Format, lint, typecheck
              run: deno task check

    test:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Set up Deno
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
              with:
                  deno-version: v2.x
                  cache: true

            - name: Install dependencies
              run: deno install --frozen

            - name: Run tests
              run: deno task test

    # Windows coverage exists to exercise browser discovery against the
    # runner's preinstalled Chrome; the full suite still gates on ubuntu.
    test-windows:
        runs-on: windows-latest
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Set up Deno
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
              with:
                  deno-version: v2.x
                  cache: true

            - name: Install dependencies
              run: deno install --frozen

            - name: Run tests
              run: deno task test

    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Set up Deno
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
              with:
                  deno-version: v2.x
                  cache: true

            - name: Install dependencies
              run: deno install --frozen

            - name: Build dist
              run: deno task build
