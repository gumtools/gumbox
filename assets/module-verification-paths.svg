<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif">
  <style>
    .card { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1.5; }
    .title { fill: #1f2328; font-size: 26px; font-weight: 600; }
    .muted { fill: #59636e; font-size: 21px; }
    .mono { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; }
    .ok { fill: #1a7f37; font-size: 21px; }
    .arrow { stroke: #818b98; fill: none; }
    .arrowhead { fill: #818b98; }
    @media (prefers-color-scheme: dark) {
      .card { fill: #161b22; stroke: #3d444d; }
      .title { fill: #e6edf2; }
      .muted { fill: #9198a1; }
      .ok { fill: #3fb950; }
      .arrow { stroke: #767e89; }
      .arrowhead { fill: #767e89; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" class="arrowhead"/>
    </marker>
  </defs>

  <!-- sparkles, echoing the banner artwork -->
  <g fill="#F9A8D4">
    <path d="M120 60 l4.5 13 13 4.5 -13 4.5 -4.5 13 -4.5 -13 -13 -4.5 13 -4.5 Z"/>
    <path d="M1320 95 l4.5 13 13 4.5 -13 4.5 -4.5 13 -4.5 -13 -13 -4.5 13 -4.5 Z"/>
  </g>
  <g fill="#FB923C">
    <path d="M455 425 l3.5 10 10 3.5 -10 3.5 -3.5 10 -3.5 -10 -10 -3.5 10 -3.5 Z" opacity="0.9"/>
    <path d="M1150 25 l3.5 10 10 3.5 -10 3.5 -3.5 10 -3.5 -10 -10 -3.5 10 -3.5 Z" opacity="0.9"/>
  </g>
  <g fill="#EC4899" opacity="0.75">
    <circle cx="240" cy="120" r="4"/>
    <circle cx="60" cy="430" r="3.5"/>
    <circle cx="1480" cy="430" r="4"/>
  </g>

  <!-- card: the edit a box makes -->
  <rect x="40" y="183" width="360" height="112" rx="12" class="card"/>
  <text x="220" y="231" text-anchor="middle" class="title">✏️ box edit</text>
  <text x="220" y="269" text-anchor="middle" class="muted">did HMR really apply?</text>

  <!-- fan-out arrows -->
  <path d="M416 239 C 470 239, 480 80, 536 80" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="416" y1="239" x2="536" y2="239" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M416 239 C 470 239, 480 398, 536 398" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- card: vite module runner -->
  <rect x="560" y="12" width="540" height="136" rx="12" class="card"/>
  <text x="830" y="58" text-anchor="middle" class="title">⚡ Vite module runner</text>
  <text x="830" y="94" text-anchor="middle" class="muted">runs modules through the real pipeline</text>
  <text x="830" y="124" text-anchor="middle" class="ok mono">no browser · fast</text>

  <!-- card: synthetic HMR client -->
  <rect x="560" y="171" width="540" height="136" rx="12" class="card"/>
  <text x="830" y="217" text-anchor="middle" class="title">🔌 synthetic HMR client</text>
  <text x="830" y="253" text-anchor="middle" class="muted">records update / full-reload payloads</text>
  <text x="830" y="283" text-anchor="middle" class="ok mono">no browser · fast</text>

  <!-- card: real browser (today) -->
  <rect x="560" y="330" width="540" height="136" rx="12" class="card"/>
  <text x="830" y="376" text-anchor="middle" class="title">🌐 real browser — today</text>
  <text x="830" y="412" text-anchor="middle" class="muted">playwright-core: DOM, clicks, screenshots</text>
  <text x="830" y="442" text-anchor="middle" class="muted mono">full fidelity · slowest</text>

  <!-- fan-in arrows -->
  <path d="M1116 80 C 1160 80, 1150 215, 1186 215" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="1116" y1="239" x2="1186" y2="239" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1116 398 C 1160 398, 1150 263, 1186 263" class="arrow" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- card: the receipt -->
  <rect x="1210" y="183" width="300" height="112" rx="12" class="card"/>
  <text x="1360" y="231" text-anchor="middle" class="title">🧾 receipt</text>
  <text x="1360" y="269" text-anchor="middle" class="muted">same evidence</text>
</svg>
